<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Haptics Dashboard</title>
  <style>
    body { background:#120018;color:#ff4dff;font-family:sans-serif;text-align:center;padding:20px;}
    .box { background:#1f002b;padding:20px;border-radius:12px;width:380px;margin:auto;box-shadow:0 0 20px #ff4dff33;}
    input {width:90%;padding:8px;margin:6px 0;background:#2a0038;border:1px solid #ff4dff;color:#ff4dff;border-radius:6px;}
    button {background:#ff4dff;border:none;padding:10px;margin-top:10px;cursor:pointer;width:95%;font-weight:bold;}
    pre {text-align:left;background:#000;padding:10px;margin-top:10px;border-radius:8px;white-space:pre-wrap;}
    label {display:block;margin-top:8px;}
  </style>
</head>
<body>
  <h1>💖 Neon Haptics Dashboard</h1>
  <div class="box">
    <label>Hit Intensity (vibrate 0.0 - 1.0)</label>
    <input id="hit_intensity" type="number" min="0" max="1" step="0.01" value="0.8">

    <label>Miss Intensity (rotate 0.0 - 1.0)</label>
    <input id="miss_intensity" type="number" min="0" max="1" step="0.01" value="0.5">

    <label>Duration (ms)</label>
    <input id="duration_ms" type="number" min="10" max="5000" value="120">

    <label>Enabled (true/false)</label>
    <input id="enabled" type="text" value="true">

    <button onclick="saveSettings()">Save Settings</button>
    <button onclick="testMode('hit')">Test Hit (Vibrate)</button>
    <button onclick="testMode('miss')">Test Miss (Rotate)</button>
    <button onclick="loadSettings()">Refresh Settings</button>

    <pre id="output">No data yet</pre>
  </div>

  <script>
    async function loadSettings() {
      const res = await fetch('/settings');
      const data = await res.json();
      document.getElementById('hit_intensity').value = data.hit_intensity;
      document.getElementById('miss_intensity').value = data.miss_intensity;
      document.getElementById('duration_ms').value = data.duration_ms;
      document.getElementById('enabled').value = String(data.enabled);
      document.getElementById('output').innerText = "Loaded:\n" + JSON.stringify(data, null, 2);
    }

    async function saveSettings(){
      const payload = {
        hit_intensity: parseFloat(document.getElementById('hit_intensity').value),
        miss_intensity: parseFloat(document.getElementById('miss_intensity').value),
        duration_ms: parseInt(document.getElementById('duration_ms').value),
        enabled: document.getElementById('enabled').value.trim().toLowerCase() === "true"
      };
      const res = await fetch('/settings', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      });
      document.getElementById('output').innerText = "Saved:\n" + JSON.stringify(await res.json(), null, 2);
    }

    async function testMode(mode){
      const res = await fetch(`/test?mode=${mode}`);
      document.getElementById('output').innerText = "Tested " + mode + ":\n" + JSON.stringify(await res.json(), null, 2);
    }

    loadSettings();
  </script>
</body>
</html>
